<script>
  // Replace with your real Azure Function URL
  const FUNCTION_URL = "https://sourcebackend-cpetgwefcjc6auf0.swedencentral-01.azurewebsites.net/";

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleString();
  }

  async function loadBlogList() {
    const container = document.getElementById("blogList");

    try {
      const res = await fetch(FUNCTION_URL);
      if (!res.ok) {
        container.innerText = "Could not load news.";
        return;
      }

      const posts = await res.json();

      if (!posts.length) {
        container.innerText = "No posts yet.";
        return;
      }

      container.innerHTML = posts
        .map(
          (post, index) => `
        <article class="post ${index === 0 ? "expanded" : ""}">
          <h2>${post.title}</h2>
          <small>${formatDate(post.created)}</small>
          <div class="post-body">${post.html}</div>
          <button class="toggle-btn">
            ${index === 0 ? "Show less" : "Show more"}
          </button>
        </article>
      `
        )
        .join("");

      container.addEventListener("click", (e) => {
        if (e.target.classList.contains("toggle-btn")) {
          const postEl = e.target.closest(".post");
          const expanded = postEl.classList.toggle("expanded");
          e.target.textContent = expanded ? "Show less" : "Show more";
        }
      });
    } catch (err) {
      container.innerText = "Error loading posts.";
    }
  }

  loadBlogList();
</script>
